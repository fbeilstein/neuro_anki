<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neuro Anki - {{ course }}</title>
    <script src="{{ url_for('serve_engine_js') }}" defer></script>
    <style>
        :root {
            --bg: #1e1e1e;
            --card: #2d2d2d;
            --text: #e0e0e0;
            --accent: #4a90e2;
            --success: #4cd964;
            --danger: #ff6b6b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sidebar {
            width: 300px;
            background: #252525;
            border-left: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
        }

        .widget h3 {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: -20px;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .progress-track {
            background: #333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--success);
            height: 100%;
            transition: width 0.3s;
        }

        .stats-text {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
            text-align: right;
        }

        .flashcard {
            position: relative;
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 1.5rem;
            background: #333;
            border: 2px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            text-align: center;
            margin-top: 20px;
        }

        input:focus {
            border-color: var(--accent);
        }

        input:read-only {
            opacity: 0.8;
            cursor: default;
        }

        .answer-reveal {
            display: none;
            margin-top: 30px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

            {% block custom_css %} {% endblock %}

        /* Edit Button Style */
        .edit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #444;
            font-size: 1.5rem;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .edit-btn:hover {
            color: var(--accent);
        }

        .delete-btn {
            position: absolute;
            top: 20px;
            right: 55px;
            background: transparent;
            border: none;
            color: #444;
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }

        .delete-btn:hover {
            color: var(--danger);
        }

        .sidebar-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .action-btn {
            flex: 1;
            display: block;
            background: #333;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            border: 2px dashed #444;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .add-btn {
            color: var(--accent);
        }

        .add-btn:hover {
            background: #3a3a3a;
            border-color: var(--accent);
            color: white;
        }

        .search-btn {
            color: #aaa;
        }

        .search-btn:hover {
            background: #3a3a3a;
            border-color: #aaa;
            color: white;
        }

        .course-switcher select {
            width: 100%;
            background: #333;
            color: var(--text);
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            text-transform: capitalize;
            cursor: pointer;
            outline: none;
        }

        .course-switcher select:hover {
            border-color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="main-stage">
        <div class="flashcard">
            <a href="/edit/{{ card['id'] }}" class="edit-btn" title="Edit Card">✎</a>
            <form action="/delete_card" method="POST" style="display:inline;"
                onsubmit="return confirm('Delete this card permanently?');">
                <input type="hidden" name="card_id" value="{{ card['id'] }}">
                <button type="submit" class="delete-btn" title="Delete Card">🗑</button>
            </form>
            {% block question_area %}{% endblock %}

            <form id="ans-form" action="/answer" method="POST">
                <input type="text" id="user-input" autocomplete="off" placeholder="Type answer..." autofocus>
                <input type="hidden" name="card_id" value="{{ card['id'] }}">
                <input type="hidden" name="source" value="{{ source }}">
                <input type="hidden" name="grade" id="hidden-grade" value="0">
            </form>

            <div id="answer-box" class="answer-reveal">
                {% block answer_area %}{% endblock %}
                <div style="margin-top:30px; color:#555; font-size:0.9rem;">Press ENTER to continue</div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-actions">
            <a href="/add" class="action-btn add-btn">+ Add</a>
            <a href="/search" class="action-btn search-btn">🔍 Search</a>
        </div>

        <div class="widget">
            <h3>Course</h3>
            <div class="course-switcher">
                <select id="course-select" onchange="if(this.value) window.location.href='/switch/'+this.value">
                    {% for c in courses %}
                    <option value="{{ c }}" {{ 'selected' if c==course else '' }}>{{ c | capitalize }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        {% include 'includes/progress.html' %}
        {% include 'includes/histogram.html' %}
        {% include 'includes/drum.html' %}
    </div>

</body>

</html>
