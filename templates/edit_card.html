<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Card {{ card['id'] }}</title>
    <style>
        body {
            background: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .editor-container {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 12px;
            width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            color: #4a90e2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        input[type="text"] {
            width: 100%;
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-row {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* FIX: Apply button shape to both <button> and .btn-cancel (which is an <a>) */
        button,
        .btn-cancel {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            /* Remove underline from link */
            display: inline-block;
            /* Ensure link respects padding */
            text-align: center;
            font-family: inherit;
        }

        .btn-save {
            background: #4cd964;
            color: #0a3a12;
            font-weight: bold;
        }

        .btn-cancel {
            background: #ff6b6b;
            color: #3a0a0a;
        }

        .btn-cancel:hover {
            background: #ff5252;
        }

        .field-name {
            font-family: monospace;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="editor-container">
        <h1>Edit Card #{{ card['id'] }}</h1>

        <form action="/save_card" method="POST">
            <input type="hidden" name="card_id" value="{{ card['id'] }}">
            <input type="hidden" name="next_url" value="{{ next_url }}">

            {% for key, value in fields.items() %}
            <div class="form-group">
                <label>{{ key }}</label>
                {% if value|string|length > 60 %}
                <textarea name="{{ key }}" rows="3">{{ value }}</textarea>
                {% else %}
                <input type="text" name="{{ key }}" value="{{ value }}">
                {% endif %}
            </div>
            {% endfor %}

            <div class="btn-row">
                <a href="{{ next_url }}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-save">Save Changes</button>
            </div>
        </form>
    </div>

</body>

</html>
